[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cad-spec-gen"
version = "1.5.0"
description = "CAD pipeline skill: design doc → structured spec → code generation → 3D renders → photorealistic images"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "proecheng" }
]
keywords = ["cad", "cadquery", "pipeline", "mechanical-design", "blender", "ai-skill"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "Jinja2>=3.0",
]

[project.optional-dependencies]
cad = ["cadquery>=2.0", "ezdxf>=0.18"]
render = ["matplotlib>=3.5", "Pillow>=9.0"]
all = ["cadquery>=2.0", "ezdxf>=0.18", "matplotlib>=3.5", "Pillow>=9.0"]

[project.scripts]
cad-skill-setup = "cad_spec_gen.cli:main_setup"
cad-skill-check = "cad_spec_gen.cli:main_check"

[project.urls]
Homepage = "https://github.com/proecheng/cad-spec-gen"
Repository = "https://github.com/proecheng/cad-spec-gen"

[tool.hatch.build.targets.sdist]
include = ["src/cad_spec_gen/**", "README.md", "LICENSE"]

[tool.hatch.build.targets.wheel]
packages = ["src/cad_spec_gen"]

[tool.hatch.build.targets.wheel.hooks.custom]
path = "hatch_build.py"
