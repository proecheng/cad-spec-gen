# parts_library.default.yaml
# ===========================
# Default parts library registry shipped with cad-spec-gen.
#
# Projects override by placing their own `parts_library.yaml` at the
# project root, or by setting the `CAD_PARTS_LIBRARY` env var, or by
# passing --parts-library PATH to `gen_std_parts.py` / `cad_pipeline.py`.
#
# Since v2.8.2-dev, this file ships vendor STEP mappings that point at the
# **shared cache** (`~/.cad-spec-gen/step_cache/`). On first use the
# step_pool_adapter calls `adapters/parts/vendor_synthesizer.py` to write
# a parametric stand-in for each vendor part into the cache, so a fresh
# project with only a design document can still route vendor BOM rows to
# real geometry without a hand-crafted project-level parts_library.yaml.
#
# To DISABLE all library resolution and force the legacy behavior:
#   - set CAD_PARTS_LIBRARY_DISABLE=1 in the environment
#
# To use real vendor STEP files instead of the synthesized stand-ins:
#   - drop the file at `~/.cad-spec-gen/step_cache/<vendor>/<model>.step`
#     (adapter will prefer the existing file over synthesizing), or
#   - drop the file under a project-local `std_parts/` directory (which
#     is searched before the shared cache)
#
# See docs/PARTS_LIBRARY.md for the full mapping rule vocabulary.

version: 1

# step_pool.root is still searched first (projects can override with real
# STEP files under `std_parts/<vendor>/<model>.step`), but the effective
# default search path is the shared cache.
step_pool:
  root: std_parts/
  # Leave `cache:` unset here so the adapter falls back to the skill-level
  # default from vendor_synthesizer.default_cache_root()
  # (~/.cad-spec-gen/step_cache/ or $CAD_SPEC_GEN_STEP_CACHE).

bd_warehouse:
  enabled: true

partcad:
  enabled: false

# ═══════════════════════════════════════════════════════════════════════
# SolidWorks Toolbox integration (Phase SW-B, opt-in + runtime self-report)
# ═══════════════════════════════════════════════════════════════════════
# `enabled: auto` — adapter runs `is_available()` to self-report; no user
# action required. When SW is absent, this section is silently ignored.
#
# Cache path resolution order (决策 #16):
#   1. This yaml's `cache` field (leave unset to skip)
#   2. Env var CAD_SPEC_GEN_SW_TOOLBOX_CACHE
#   3. Default: Path.home() / '.cad-spec-gen' / 'step_cache' / 'sw_toolbox'
#
# ⚠️ 浅覆盖陷阱（v3）：project-level parts_library.yaml 若 `extends: default`
# 并只想覆盖单字段，必须把本段完整重抄一遍，否则未覆盖字段会丢失。
solidworks_toolbox:
  enabled: auto
  standards: [GB, ISO, DIN]
  # cache: ~/.cad-spec-gen/step_cache/sw_toolbox/   # 默认注释掉
  min_score: 0.30

  # 加权 token overlap（决策 #12）
  token_weights:
    part_no: 0.0        # 内部项目编号无 toolbox 匹配价值，不参与打分
    name_cn: 1.0
    material: 0.5
    size: 1.5           # 从 name_cn 抽出的 M6/6205 等

  # 尺寸正则（仅公制 M 螺纹和基本轴承，决策 §1.3）
  size_patterns:
    fastener:
      size: '[Mm](\d+(?:\.\d+)?)'
      exclude_patterns: ['UN[CFEF]', '\bTr\d', '\bG\d/', '\bNPT']
    bearing:
      model: '\b(\d{4,5})\b'

  # COM subprocess 超时 + 熔断（Part 2c P0 后配置瘦身）
  # cold_start / restart / idle_shutdown 在 subprocess-per-convert 模型下
  # 已不存在——每次 convert 是独立冷启，父进程不持久 COM 状态。
  com:
    single_convert_timeout_sec: 30
    circuit_breaker_threshold: 3

mappings:
  # ─── SolidWorks Toolbox — GB 高优先级（v4 §6） ──────────────────────
  # GB/T 国标紧固件和轴承走 SW Toolbox（1818 个标准件 sldprt），仅在
  # `is_available()` 全通过时生效（SW 装了 + Toolbox Add-In 启用）。
  - match:
      category: fastener
      keyword_contains: ["GB/T", "国标", "GB "]
    adapter: sw_toolbox
    spec:
      standard: GB
      subcategories: ["bolts and studs", "nuts", "screws",
                      "washers and rings", "pins", "rivets"]
      part_category: fastener

  - match:
      category: bearing
      keyword_contains: ["GB/T", "国标", "深沟球", "圆柱滚子", "推力"]
    adapter: sw_toolbox
    spec:
      standard: GB
      subcategories: ["bearing"]
      part_category: bearing

  # ─── Vendor STEP files (skill-shipped, auto-synthesized to cache) ───
  # These rules match by substring against name_cn so they are reusable
  # across projects without depending on project-specific part_nos. The
  # adapter calls the factory registered under `spec.synthesizer` the
  # first time a project needs the file; subsequent runs hit the cached
  # geometry.

  # Vendor model names commonly appear in EITHER the BOM "name_cn" column
  # (for domestically-specified parts) or the "material" column (for 外购
  # parts where the line item is generic, e.g. name_cn="伺服电机" and
  # material="Maxon ECX SPEED 22L"). `keyword_contains` matches substrings
  # against both columns so one rule covers both conventions.

  # Maxon ECX SPEED 22L brushless motor (Φ22×68 mm body)
  - match:
      keyword_contains: ["ECX SPEED 22L", "ECX22L", "ECX 22L", "ecx_22l"]
    adapter: step_pool
    spec:
      file: "maxon/ecx_22l.step"
      synthesizer: "maxon_ecx_22l"

  # Maxon GP22C 53:1 planetary gearhead
  - match:
      keyword_contains: ["GP22C", "GP 22C", "gp22c"]
    adapter: step_pool
    spec:
      file: "maxon/gp22c.step"
      synthesizer: "maxon_gp22c"

  # LEMO FGG.0B.307 push-pull plug (also matches EGG.0B.307 and common
  # suffixes like .CLAD52 — same envelope)
  - match:
      keyword_contains: ["FGG.0B.307", "FGG 0B 307", "EGG.0B.307", "EGG 0B 307",
                          "FGG.0B", "EGG.0B", "LEMO 0B"]
    adapter: step_pool
    spec:
      file: "lemo/fgg_0b_307.step"
      synthesizer: "lemo_fgg_0b_307"

  # ATI Nano17 6-axis force/torque sensor
  - match:
      keyword_contains: ["Nano17", "Nano 17", "ATI Nano", "TWAE-03"]
    adapter: step_pool
    spec:
      file: "ati/nano17.step"
      synthesizer: "ati_nano17"

  # ─── Specialized bearing classes (tried before generic) ─────────────
  # Rules are ordered most-specific to least-specific. The bd_warehouse
  # adapter itself picks the right class from catalogs/bd_warehouse_catalog.yaml
  # based on name_keywords when spec.class is omitted, but specifying the
  # class explicitly when possible is faster and more predictable.

  - match:
      category: bearing
      name_contains: ["NU", "NJ", "NUP", "cylindrical roller", "圆柱滚子"]
    adapter: bd_warehouse
    spec:
      class: SingleRowCylindricalRollerBearing

  - match:
      category: bearing
      name_contains: ["30", "32", "tapered", "tapered roller", "圆锥滚子"]
    adapter: bd_warehouse
    spec:
      class: SingleRowTaperedRollerBearing

  - match:
      category: bearing
      name_contains: ["7200", "7201", "7202", "7203", "7204", "7205",
                      "7300", "7301", "7302", "7303", "7304",
                      "angular contact", "角接触"]
    adapter: bd_warehouse
    spec:
      class: SingleRowAngularContactBallBearing

  - match:
      category: bearing
      name_contains: ["ZZ", "2RS", "2Z", "2RZ", "sealed", "shielded",
                      "密封", "防尘"]
    adapter: bd_warehouse
    spec:
      class: SingleRowCappedDeepGrooveBallBearing

  # ─── SolidWorks Toolbox — ISO/DIN bearing 兜底（v4 §6 ordering） ────
  # 必须在 bd_warehouse generic deep-groove fallback 之前——否则 SW Toolbox
  # 永远拿不到 bearing；first-hit-wins 下 {category: bearing} 抢先。
  - match:
      category: bearing
    adapter: sw_toolbox
    spec:
      standard: [ISO, DIN]
      subcategories: ["bearings"]
      part_category: bearing

  # ─── Generic deep-groove fallback (matches any "open" bearing) ──────
  # This catches all the 6xx/6xxx/619/618 series with or without a
  # specific designation keyword. The adapter auto-extracts the size
  # via catalogs/bd_warehouse_catalog.yaml::size_patterns.iso_bearing.
  - match: {category: bearing}
    adapter: bd_warehouse
    spec:
      class: SingleRowDeepGrooveBallBearing

  # ─── Fasteners (by head type) ───────────────────────────────────────
  - match:
      category: fastener
      name_contains: ["内六角", "socket head", "cap screw", "allen"]
    adapter: bd_warehouse
    spec:
      class: SocketHeadCapScrew
  - match:
      category: fastener
      material_contains: ["内六角", "socket", "ISO4762", "DIN912"]
    adapter: bd_warehouse
    spec:
      class: SocketHeadCapScrew

  - match:
      category: fastener
      name_contains: ["沉头", "埋头", "countersunk", "flat head"]
    adapter: bd_warehouse
    spec:
      class: CounterSunkScrew

  - match:
      category: fastener
      name_contains: ["圆头", "button head", "dome"]
    adapter: bd_warehouse
    spec:
      class: ButtonHeadScrew

  - match:
      category: fastener
      name_contains: ["紧定", "set screw", "grub"]
    adapter: bd_warehouse
    spec:
      class: SetScrew

  - match:
      category: fastener
      name_contains: ["螺母", "nut"]
    adapter: bd_warehouse
    spec:
      class: HexNut

  - match:
      category: fastener
      name_contains: ["平垫圈", "washer", "垫圈"]
    adapter: bd_warehouse
    spec:
      class: PlainWasher

  - match:
      category: fastener
      material_contains: ["六角头", "hex head", "ISO4014", "DIN931"]
    adapter: bd_warehouse
    spec:
      class: HexHeadScrew

  # ─── SolidWorks Toolbox — ISO/DIN fastener 兜底（v4 §6） ─────────────
  # ISO/DIN bearing 的兜底位置需在 bd_warehouse 通用 bearing 之前，见上方
  - match:
      category: fastener
    adapter: sw_toolbox
    spec:
      standard: [ISO, DIN]
      subcategories: ["bolts", "nuts", "screws", "washers"]
      part_category: fastener

  # ─── Everything else falls through to jinja_primitive ───────────────
  # This rule is the terminal fallback. Without it, parts that don't
  # match a library source would return "miss" and gen_std_parts.py
  # would skip them entirely — breaking F5 completeness.
  - match: {any: true}
    adapter: jinja_primitive
