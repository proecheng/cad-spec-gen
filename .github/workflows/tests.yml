name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Core test suite ──────────────────────────────────────────────────
  # Runs on Linux + Windows × Python 3.10, 3.11, 3.12. Windows uses
  # PYTHONUTF8=1 to work around a bd_warehouse upstream bug where the
  # CSV parameter files contain UTF-8 characters but are opened without
  # an explicit encoding argument (gumyr/bd_warehouse#75).
  # Remove PYTHONUTF8=1 once that PR is released.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout pytest-asyncio pytest-cov
          pip install jinja2 pyyaml psutil
          pip install cadquery ezdxf

      - name: Install optional parts library deps
        run: pip install bd_warehouse
        continue-on-error: true  # bd_warehouse may fail to install on old Python

      - name: Sync data/ mirrors
        # dev_sync.py 约定：exit 0 = 无变更 / exit 1 = 有文件被同步（非错误）/ exit >1 = 真错误。
        # 用 `|| rc=$?` 避开 bash -e 在 rc=1 时直接终止 step；Windows runner 默认 pwsh 解析不了这段
        # bash 语法，所以显式 shell: bash（两边都走 Git Bash / system bash）。
        shell: bash
        run: |
          rc=0
          python scripts/dev_sync.py || rc=$?
          if [ "$rc" -gt 1 ]; then exit "$rc"; fi

      - name: Run tests with coverage gate (Linux / macOS)
        # rev 5 H + plan-drift fix：worker 在 Linux 全 SKIP（requires_solidworks）
        # 不计入 cov 分母 — 只 gate broker + cache 两模块（≥95% 防 future regression）
        if: runner.os != 'Windows'
        run: |
          pytest tests/ -v --tb=short \
            --cov=adapters.solidworks.sw_config_broker \
            --cov=adapters.solidworks.sw_config_lists_cache \
            --cov-report=term-missing \
            --cov-fail-under=95

      - name: Run tests with coverage gate (Windows, PYTHONUTF8=1)
        # Workaround for gumyr/bd_warehouse#75 — forces Python to use
        # UTF-8 for open() defaults so bd_warehouse CSV reads don't
        # crash on non-UTF-8 locale hosts. Remove once the upstream PR
        # lands and we bump the pin.
        # Windows cov gate：全 3 模块（worker 测试全跑）
        if: runner.os == 'Windows'
        env:
          PYTHONUTF8: "1"
        run: |
          pytest tests/ -v --tb=short --cov=adapters.solidworks.sw_config_broker --cov=adapters.solidworks.sw_config_lists_cache --cov=adapters.solidworks.sw_list_configs_worker --cov-report=term-missing --cov-fail-under=95

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: .coverage
          if-no-files-found: ignore

  # ─── Byte-identical regression gate ───────────────────────────────────
  # Proves that with CAD_PARTS_LIBRARY_DISABLE=1 OR no parts_library.yaml,
  # the gen_std_parts.py output is unchanged from pre-v2.8.0 master.
  #
  # This is the core safety net for the parts library refactor — any
  # regression in the jinja_primitive fallback path breaks this job.
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest jinja2 pyyaml cadquery ezdxf

      - name: Sync data/ mirrors
        # 同 test 矩阵：dev_sync.py exit 1 = 有文件被同步（非错误），只有 >1 才是真错误。
        shell: bash
        run: |
          rc=0
          python scripts/dev_sync.py || rc=$?
          if [ "$rc" -gt 1 ]; then exit "$rc"; fi

      - name: Run parts_resolver unit tests with kill switch
        env:
          CAD_PARTS_LIBRARY_DISABLE: "1"
        run: |
          pytest tests/test_parts_resolver.py tests/test_parts_adapters.py -v
