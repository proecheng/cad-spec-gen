name: sw-smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sw-smoke
  cancel-in-progress: false  # D7：保留队首，避免 cancel 吃 artifact

jobs:
  sw-smoke:
    # D15：commit message 含 [skip smoke] 或 [skip sw-smoke] 时跳过（避让开发者当前在用 SW）
    # 注：workflow_dispatch 时 head_commit 为 null，contains() 返回 false，手动触发不受 skip 影响（预期）
    if: >-
      !contains(github.event.head_commit.message, '[skip smoke]') &&
      !contains(github.event.head_commit.message, '[skip sw-smoke]')
    runs-on: [self-hosted, windows, solidworks]
    timeout-minutes: 15
    steps:
      - name: Pre-checkout workspace cleanup (F-1.3j 防 protected-ACL 残留)
        shell: pwsh
        env:
          PYTHONUTF8: "1"
        run: |
          # P2-O：兜底 kill SW 残留进程
          Get-Process SLDWORKS -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "Stopping orphan SLDWORKS PID=$($_.Id) StartTime=$($_.StartTime)"
            $_ | Stop-Process -Force -ErrorAction SilentlyContinue
          }

          # P2-D part 2：守卫强化 — workspace 未定义 / 空字符串 / 不存在 三种均跳过
          $ws = $env:GITHUB_WORKSPACE
          if (-not $ws -or $ws.Trim() -eq '' -or -not (Test-Path -LiteralPath $ws)) {
            Write-Host "workspace not yet created or undefined, skip"
            exit 0
          }

          # 仅清理白名单内路径（spec §2.2 cleanup 白名单）
          $cache = Join-Path $ws '.pytest_cache'
          if (Test-Path -LiteralPath $cache) {
            Write-Host "Removing $cache (best-effort)"
            Remove-Item -Recurse -Force -LiteralPath $cache -ErrorAction SilentlyContinue
            # P2-L：silent-fail 可观测性 — 失败时发 GitHub workflow command annotation
            if (Test-Path -LiteralPath $cache) {
              Write-Host "::warning title=cleanup_residual::pre-checkout cleanup left .pytest_cache; ACL drift suspected; checkout fallback will attempt recreate"
            }
          }
          Get-ChildItem -Path $ws -Filter '__pycache__' -Recurse -Force -Directory -EA SilentlyContinue |
            Remove-Item -Recurse -Force -EA SilentlyContinue

      - uses: actions/checkout@v6
        with:
          clean: true  # 显式（D4 long-lived runner 的清场保证）

      - name: Setup CAD env (composite)
        uses: ./.github/actions/setup-cad-env

      - name: Run SW real smoke (pytest 回归)
        shell: bash
        env:
          PYTHONUTF8: "1"
        run: |
          # 用 `python -m pytest` 而非 `pytest`：前者让 sys.path[0] = cwd（项目根），
          # 后者 sys.path[0] = pytest.exe 所在 Scripts 目录，`from tools.xxx` import 会失败。
          # F-1.3 首跑踩坑（见 run 24554711697）。
          python -m pytest tests/test_sw_inspect_real.py -v --tb=short \
                 -m requires_solidworks \
                 --junitxml=sw-smoke-junit.xml

      - name: Skip-guard (ET-based, D10)
        shell: bash
        run: |
          python -c "
          from xml.etree import ElementTree as ET
          root = ET.parse('sw-smoke-junit.xml').getroot()
          all_tcs = list(root.iter('testcase'))
          skipped = [tc for tc in all_tcs if tc.find('skipped') is not None]
          real = len(all_tcs) - len(skipped)
          print(f'skip-guard: total={len(all_tcs)} skipped={len(skipped)} real={real}')
          assert real == 2, f'expected exactly 2 real testcases (test_fast_real_smoke + test_deep_real_smoke), got {real} — marker 漂移或新测试未授 @requires_solidworks'
          "

      - name: Emit sw-inspect JSON artifact (独立 CLI run, D11)
        shell: bash
        env:
          PYTHONUTF8: "1"
        run: |
          python cad_pipeline.py sw-inspect --deep --json > sw-inspect-deep.json
          python tools/assert_sw_inspect_schema.py sw-inspect-deep.json

      - name: Write human-readable step summary (D16)
        if: always()
        shell: bash
        env:
          PYTHONUTF8: "1"
        run: |
          echo '## sw-inspect (deep) 输出' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python cad_pipeline.py sw-inspect --deep >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sw-smoke-artifacts
          path: |
            sw-smoke-junit.xml
            sw-inspect-deep.json
          if-no-files-found: error
