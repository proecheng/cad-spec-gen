name: sw-smoke

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full:
        description: Run real Toolbox STEP export and codegen consumption E2E
        required: false
        default: false
        type: boolean

concurrency:
  group: sw-smoke
  cancel-in-progress: false  # D7：保留队首，避免 cancel 吃 artifact

jobs:
  sw-smoke:
    # D15：commit message 含 [skip smoke] 或 [skip sw-smoke] 时跳过（避让开发者当前在用 SW）
    # 注：workflow_dispatch 时 head_commit 为 null，contains() 返回 false，手动触发不受 skip 影响（预期）
    if: >-
      !contains(github.event.head_commit.message, '[skip smoke]') &&
      !contains(github.event.head_commit.message, '[skip sw-smoke]')
    runs-on: [self-hosted, windows, solidworks]
    timeout-minutes: 15
    steps:
      - name: Pre-checkout workspace cleanup (F-1.3j 防 protected-ACL 残留)
        shell: powershell
        env:
          PYTHONUTF8: "1"
        run: |
          # P2-O：兜底 kill SW 残留进程
          Get-Process SLDWORKS -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "Stopping orphan SLDWORKS PID=$($_.Id) StartTime=$($_.StartTime)"
            $_ | Stop-Process -Force -ErrorAction SilentlyContinue
          }

          # P2-D part 2：守卫强化 — workspace 未定义 / 空字符串 / 不存在 三种均跳过
          $ws = $env:GITHUB_WORKSPACE
          if (-not $ws -or $ws.Trim() -eq '' -or -not (Test-Path -LiteralPath $ws)) {
            Write-Host "workspace not yet created or undefined, skip"
            exit 0
          }

          # 仅清理白名单内路径（spec §2.2 cleanup 白名单）
          $cache = Join-Path $ws '.pytest_cache'
          if (Test-Path -LiteralPath $cache) {
            Write-Host "Removing $cache (best-effort)"
            Remove-Item -Recurse -Force -LiteralPath $cache -ErrorAction SilentlyContinue
            # P2-L：silent-fail 可观测性 — 失败时发 GitHub workflow command annotation
            if (Test-Path -LiteralPath $cache) {
              Write-Host "::warning title=cleanup_residual::pre-checkout cleanup left .pytest_cache; ACL drift suspected; checkout fallback will attempt recreate"
            }
          }
          Get-ChildItem -Path $ws -Filter '__pycache__' -Recurse -Force -Directory -ErrorAction SilentlyContinue |
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

      - uses: actions/checkout@v6
        id: checkout
        continue-on-error: true
        with:
          clean: true  # 显式（D4 long-lived runner 的清场保证）

      - name: Fallback API checkout (git fetch outage)
        if: steps.checkout.outcome == 'failure'
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PYTHONUTF8: "1"
        run: |
          $ErrorActionPreference = 'Stop'
          $workspace = $env:GITHUB_WORKSPACE
          if (-not $workspace -or $workspace.Trim() -eq '') {
            throw 'GITHUB_WORKSPACE is empty; refusing fallback checkout'
          }
          New-Item -ItemType Directory -Force -Path $workspace | Out-Null

          $workspaceRoot = [System.IO.Path]::GetFullPath($workspace).TrimEnd('\', '/')
          $archive = Join-Path $env:RUNNER_TEMP 'cad-spec-gen-source.zip'
          $extract = Join-Path $env:RUNNER_TEMP 'cad-spec-gen-source'
          if (Test-Path -LiteralPath $extract) {
            Remove-Item -Recurse -Force -LiteralPath $extract
          }
          if (Test-Path -LiteralPath $archive) {
            Remove-Item -Force -LiteralPath $archive
          }

          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
            'User-Agent' = 'cad-spec-gen-sw-smoke'
          }
          $zipUrl = "https://api.github.com/repos/$env:GITHUB_REPOSITORY/zipball/$env:GITHUB_SHA"
          Invoke-WebRequest -Uri $zipUrl -Headers $headers -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $extract -Force

          $source = Get-ChildItem -LiteralPath $extract -Directory -Force | Select-Object -First 1
          if (-not $source) {
            throw "zipball/$env:GITHUB_SHA did not contain a source directory"
          }

          Get-ChildItem -LiteralPath $workspace -Force -ErrorAction SilentlyContinue | ForEach-Object {
            $childPath = [System.IO.Path]::GetFullPath($_.FullName)
            if (-not $childPath.StartsWith($workspaceRoot + [System.IO.Path]::DirectorySeparatorChar, [System.StringComparison]::OrdinalIgnoreCase)) {
              throw "refusing to remove path outside workspace: $childPath"
            }
            Remove-Item -Recurse -Force -LiteralPath $_.FullName -ErrorAction SilentlyContinue
          }
          Get-ChildItem -LiteralPath $source.FullName -Force | ForEach-Object {
            Copy-Item -Recurse -Force -LiteralPath $_.FullName -Destination $workspace
          }
          Write-Host "fallback checkout extracted zipball/$env:GITHUB_SHA"

      - name: 零硬编码静态校验 (AC-2.5.1)
        shell: powershell
        run: |
          $preflight = Join-Path $env:GITHUB_WORKSPACE 'sw_preflight'
          if (-not (Test-Path -LiteralPath $preflight)) {
            throw "missing sw_preflight directory: $preflight"
          }
          $sourceFiles = Get-ChildItem -LiteralPath $preflight -File -Recurse |
            Where-Object {
              $_.FullName -notmatch '[\\/]+__pycache__[\\/]' -and
              $_.Extension -ne '.pyc'
            }
          $matches = $sourceFiles |
            Select-String -Pattern 'Program Files|D:\\\\|"20(2[0-9]|3[0-9])"'
          if ($matches) {
            $matches | ForEach-Object {
              Write-Host "$($_.Path):$($_.LineNumber):$($_.Line)"
            }
            Write-Host "::error::sw_preflight contains forbidden hardcoded literals"
            exit 1
          }
          Write-Host "zero hardcode check passed"

      - name: Setup CAD env (composite)
        uses: ./.github/actions/setup-cad-env

      - name: Run SW real smoke (pytest 回归)
        shell: powershell
        env:
          PYTHONUTF8: "1"
        run: |
          # 用 `python -m pytest` 而非 `pytest`：前者让 sys.path[0] = cwd（项目根），
          # 后者 sys.path[0] = pytest.exe 所在 Scripts 目录，`from tools.xxx` import 会失败。
          # F-1.3 首跑踩坑（见 run 24554711697）。
          python -m pytest tests/test_sw_inspect_real.py -v --tb=short `
            -m requires_solidworks `
            --junitxml=sw-smoke-junit.xml

      - name: Skip-guard (ET-based, D10)
        shell: powershell
        env:
          PYTHONUTF8: "1"
        run: |
          $script = @'
          from xml.etree import ElementTree as ET
          root = ET.parse('sw-smoke-junit.xml').getroot()
          all_tcs = list(root.iter('testcase'))
          skipped = [tc for tc in all_tcs if tc.find('skipped') is not None]
          real = len(all_tcs) - len(skipped)
          print(f'skip-guard: total={len(all_tcs)} skipped={len(skipped)} real={real}')
          assert real == 2, f'expected exactly 2 real testcases (test_fast_real_smoke + test_deep_real_smoke), got {real}; marker drift or missing @requires_solidworks'
          '@
          python -c $script

      - name: Emit sw-inspect JSON artifact (独立 CLI run, D11)
        shell: powershell
        env:
          PYTHONUTF8: "1"
        run: |
          # cad_pipeline sw-inspect 按 spec §5.1 退出码：
          #   0=ok / 1=warn / 2=static fail / 3=dispatch fail / 4=loadaddin fail
          # CI 策略：warn（rc=1）放行，让 assert_sw_inspect_schema 做结构 gate；
          # rc>=2 真失败仍阻断（保留 Phase A `|| true` 击穿修复意图）
          $inspectJson = & python cad_pipeline.py sw-inspect --deep --json
          $cpRc = $LASTEXITCODE
          $artifactPath = Join-Path (Get-Location) 'sw-inspect-deep.json'
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($artifactPath, ($inspectJson -join [System.Environment]::NewLine), $utf8NoBom)
          if ($cpRc -ge 2) {
            echo "::error title=sw_inspect_fail::sw-inspect rc=$cpRc (severity=fail), blocking CI"
            exit $cpRc
          }
          python tools/assert_sw_inspect_schema.py sw-inspect-deep.json

      - name: Run SW Toolbox model-library E2E
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full }}
        shell: powershell
        env:
          PYTHONUTF8: "1"
        run: |
          python cad_pipeline.py sw-toolbox-e2e --out-dir artifacts/sw-toolbox-e2e

      - name: Write human-readable step summary (D16)
        if: always()
        shell: powershell
        env:
          PYTHONUTF8: "1"
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## sw-inspect (deep) output'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
          $inspectText = & python cad_pipeline.py sw-inspect --deep 2>&1
          if ($inspectText) {
            $inspectText | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
          exit 0

      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sw-smoke-artifacts
          path: |
            sw-smoke-junit.xml
            sw-inspect-deep.json
            artifacts/sw-toolbox-e2e/**
          if-no-files-found: warn
