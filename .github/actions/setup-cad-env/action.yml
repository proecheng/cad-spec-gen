name: Setup CAD env
description: |
  sw-smoke / 未来 CAD-related CI 共享的前置：
  用系统 Python 3.12 + pip install 运行期依赖 + dev_sync.py 同步 data/ mirrors。

  消费者：sw-smoke（首个）；F-1.3b 扩展时复用；未来 tests.yml 迁移（F-1.3g）。

  **Self-hosted runner 场景要求**（runbook §1 前置）：机器系统 PATH 含
  Python 3.12.x（`D:\Python312\` 或等价）。不用 `actions/setup-python@v6`
  因其在 self-hosted Windows 上 setup.ps1 找不到 downloaded installer exe
  （F-1.3 首跑踩坑）；也省一次 Python 下载/安装的 CI 时间。

runs:
  using: composite
  steps:
    - name: Verify system Python 3.12
      shell: bash
      run: |
        python --version
        python -c "import sys; assert sys.version_info[:2] == (3, 12), f'expected Python 3.12.x, got {sys.version}'; print(f'OK: Python {sys.version.split()[0]} from {sys.executable}')"

    - name: Install runtime deps
      shell: bash
      run: |
        python -m pip install --upgrade pip
        # 对齐 tests.yml 的 unpinned 约定（spec §8 已知债务）；
        # 不走 `pip install -e .` 规避 hatch_build.py custom hook 副作用（spec §4.1 / D12）
        pip install pywin32 pytest pytest-timeout Jinja2 psutil PyYAML

    - name: Sync data/ mirrors
      # 与 tests.yml 一致：dev_sync.py exit 0 无变更 / 1 有同步（非错误）/ >1 真错误
      shell: bash
      run: |
        rc=0
        python scripts/dev_sync.py || rc=$?
        if [ "$rc" -gt 1 ]; then exit "$rc"; fi
