# bd_warehouse static catalog
# =============================
#
# This file lets BdWarehouseAdapter answer is_available() and can_resolve()
# without importing bd_warehouse itself (which is an optional dependency).
# It also tells probe_dims() how to compute (w, d, h) from a size string
# without instantiating a full bd_warehouse.Part.
#
# Version pinning: bd_warehouse changes shape-parameter names between
# releases, so catalog entries pin a known-good version. On mismatch the
# adapter warns.
#
# Catalog extracted from bd_warehouse 0.2.0 via
# `tools/check_bd_warehouse_upstream.py`-style CSV dump. See the
# iso_designation_map blocks for every ISO 15 designation the library
# currently supports.

version: 2
bd_warehouse_pinned_version: ">=0.2.0,<0.4.0"

# ─── Bearings ────────────────────────────────────────────────────────────
# Source: bd_warehouse/bearing.py — 5 classes, sizes driven by CSV files
# in bd_warehouse/data/*_parameters.csv

